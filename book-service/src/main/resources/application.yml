server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:bookdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  graphql:
    path: /book

    graphiql:
      enabled: true
      endpoint: /book

logging:
  level:
    org.springframework.boot.autoconfigure.graphql: DEBUG